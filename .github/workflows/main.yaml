name: Main CI/CD

on:
  push:
    branches: [main, master]
    tags:
      - 'v*'
  pull_request:
  workflow_dispatch:

# call-release uses softprops/action-gh-release@v2 which needs
# contents: write to create a GitHub Release. Reusable workflow
# permissions intersect with the caller's, and GitHub Actions'
# default GITHUB_TOKEN is read-only, so this grant must live here
# (release-worker.yaml declaring it upstream is not enough).
permissions:
  contents: write

jobs:
  call-docker-build:
    uses: ycpss91255-docker/template/.github/workflows/build-worker.yaml@v0.15.0
    with:
      image_name: seggpt
      context_path: docker
      # The runtime stage is intentionally TODO until Layer 3 (FastAPI
      # server) lands; the Dockerfile only declares sys / base / devel
      # / test for now. Disable runtime build so CI does not try to
      # resolve a missing `runtime` target. Flip back to default (true)
      # in the same PR that uncomments the runtime stage.
      build_runtime: false

  call-release:
    needs: call-docker-build
    if: startsWith(github.ref, 'refs/tags/')
    uses: ycpss91255-docker/template/.github/workflows/release-worker.yaml@v0.15.0
    with:
      archive_name_prefix: seggpt
