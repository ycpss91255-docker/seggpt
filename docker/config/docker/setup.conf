[image]
rule_1 = string:seggpt

[volumes]
# Anchor mount_1 at WS_PATH/src/seggpt so the container sees the seggpt
# repo directly at /home/${USER_NAME}/work. setup.sh's auto-detect picks
# the colocated `_ws` parent (coresam_ws) as WS_PATH; pointing ~/work at
# the parent would expose only `src/` instead of the seggpt repo root.
# Portable across machines — each contributor's WS_PATH is auto-detected
# and the relative `src/seggpt` suffix stays valid as long as the repo
# lives under `<workspace>/src/seggpt/` (the layout this fork ships with).
mount_1 = ${WS_PATH}/src/seggpt:/home/${USER_NAME}/work

[environment]
env_1 = SEGGPT_BACKEND_NAME=seggpt_vit_l
env_2 = SEGGPT_REFERENCE_MODE=named
env_3 = SEGGPT_PROMPTS_DIR=/workspace/prompts
env_4 = SEGGPT_MODEL_PATH=/workspace/model/seggpt_vit_large.pth
env_5 = SEGGPT_API_PORT=8888

[additional_contexts]
# Pull the seggpt repo root into the build context as a named context.
# Compose's main `context:` is `docker/` (template default), so without
# this entry pyproject.toml + src/ at the repo root are unreachable from
# Dockerfile COPY. With BuildKit named contexts the Dockerfile can
# `COPY --from=repo_root pyproject.toml src ./` and run `pip install -e`
# at build time — baking the editable install into the image instead
# of relying on entrypoint.sh re-installing on every container start.
#
# `..` resolves relative to compose.yaml's directory (= docker/), so it
# points at the seggpt repo root. Available in template v0.16.0+ (#199).
context_1 = repo_root=..
